name: Deploy to EC2 with Docker Compose

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Desplegar en AWS vía SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # 1. Entrar a la carpeta del proyecto
          cd ~/servidor-web-docker
          
          # 2. Bajar los últimos cambios de GitHub
          git pull origin main
          
          # 3. Re-construir y levantar los contenedores
          # Esto solo actualizará lo que haya cambiado
          docker compose up -d --build
          
          # 4. Limpieza: Borra imágenes viejas que ya no se usan (ahorra espacio)
          docker image prune -f
