name: Deploy to EC2 with Docker Compose

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Desplegar en AWS vía SSH
      uses: appleboy/ssh-action@v1.0.3
      env:
        APP_ID: "app-${{ github.event.repository.id }}"
        APP_NAME: "${{github.event.repository.name}}"
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        instance_dns: ${{secrets.INSTANCE_DNS}}
        envs: APP_ID , APP_NAME
        script: |
          # 1. Crear carpeta del proyecto si no existe
          PROJECT_ROOT=~/servidor-web-docker
          PROJECT_DIR=$PROJECT_ROOT/${{ env.APP_ID }}
          CADDYFILE_PATH=$PROJECT_ROOT/Caddyfile
          
          # 2. Validar si el proyecto ya existe en el sistema
          if [ -d "$PROJECT_DIR" ]; then
            echo "El proyecto ${{ env.APP_ID }} ya existe. Actualizando..."
            cd $PROJECT_DIR
            git pull origin main
          else
            echo "Proyecto nuevo. Creando carpeta y clonando..."
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR
            git clone https://github.com/${{ github.repository }}.git .
          fi

          DETECTED_PORT=$(grep -iE '^EXPOSE|^ENV PORT' Dockerfile | grep -oE '[0-9]+' | head -n 1)
          
          # Si no detecta nada, usamos 3000 por defecto
          APP_PORT=${DETECTED_PORT:-3000}
          echo "Puerto detectado para la app: $APP_PORT"

          # 3. Validar si el contenedor ya existe en Docker (opcional pero informativo)
          if [ $(docker ps -a -q -f name=${{ env.APP_ID }}) ]; then
            echo "El contenedor ${{ env.APP_ID }} ya está presente. Docker lo actualizará si es necesario."
          fi

          
          # mkdir -p ~/servidor-web-docker/${{ env.APP_ID }}
          # cd ~/servidor-web-docker/${{ env.APP_ID }}
          
          # -. Bajar los últimos cambios de GitHub
          # git pull origin main
          # if [ -d ".git" ]; then git pull origin main; else git clone https://github.com/${{ github.repository }}.git .; fi

          # Exportamos la variable para que docker-compose la vea
          export APP_ID=${{ env.APP_ID }}
          export APP_NAME=${{ env.APP_NAME }}

          # 4. Crear el docker-compose.yml DINÁMICO para este proyecto
          cat <<EOF > docker-compose.generated.yml
          services:
            ${APP_ID}:
              container_name: ${APP_ID}
              image: ${{ env.APP_ID }}:latest
              build:
                context: .
                dockerfile: Dockerfile
              environment:
                - PORT=$APP_PORT
              networks:
                - red_proyectos
              restart: unless-stopped
          networks:
            red_proyectos:
              external: true
          EOF
          # -. Re-construir y levantar los contenedores
          # Esto solo actualizará lo que haya cambiado
          # docker compose up -d --build

          # 4.2 Levantar este proyecto específico
          docker compose -f docker-compose.generated.yml up -d --build

          # 4.5. ACTUALIZAR CADDYFILE (Estrategia limpia con archivo temporal)
          echo "Verificando Caddyfile en $CADDYFILE_PATH"
          
          if ! grep -q "@${{ env.APP_ID }}" "$CADDYFILE_PATH"; then
            echo "Añadiendo nueva ruta a Caddy..."
            
            # Creamos un archivo temporal con la configuración limpia
            cat <<EOF > /tmp/new_route.txt
            @${{ env.APP_ID }} {
            header X-Project-Id "${{ env.APP_ID }}"
            }
            handle @${{ env.APP_ID }} {
            reverse_proxy ${{ env.APP_ID }}:$APP_PORT
            }
            EOF

            # Usamos 'r' de sed para leer el archivo justo después de la línea ':80 {'
          sed -i "/:80 {/r /tmp/new_route.txt" "$CADDYFILE_PATH"
            rm /tmp/new_route.txt
          else
            echo "La ruta ya existe. Actualizando puerto..."
            # Actualizamos el puerto si ya existía el bloque
            sed -i "/handle @${{ env.APP_ID }} {/,/}/ s/reverse_proxy .*:/reverse_proxy ${{ env.APP_ID }}:/" "$CADDYFILE_PATH"
            sed -i "/handle @${{ env.APP_ID }} {/,/}/ s/reverse_proxy ${{ env.APP_ID }}:[0-9]*/reverse_proxy ${{ env.APP_ID }}:$APP_PORT/" "$CADDYFILE_PATH"
            fi
          
          # 5. Notificar a la Lambda (AQUÍ ES DONDE SUCEDE LA MAGIA)
          echo "Enviando notificación a AWS Lambda..."
          Response=$(curl -X POST ${{ secrets.LAMBDA_URL }} \
          -H "Content-Type: application/json" \
          -d '{
            "project_id": "${{ env.APP_ID }}",
            "action": "deploy",
            "project_name": "${{env.APP_NAME}}",
            "instance_ip": "${{ secrets.REMOTE_HOST }}",
            "instance_dns": "${{secrets.INSTANCE_DNS}}"
          }')
          echo "------------------------------------------------------"
          echo "Respuesta de la lambda"
          echo "$Response"
          echo "------------------------------------------------------"
